<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>全身自撮りカメラ 背景透明 PNG</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-cpu"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
<style>
body{margin:0;font-family:sans-serif;background:#222;color:white;text-align:center;}
.camera-container{position:relative; display:inline-block;}
#video{width:100vw; max-width:800px; height:auto; border:1px solid #333; background:black;}
#overlay{position:absolute; top:0; left:0; width:100%; height:100%;}
#dark-overlay{position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:5; flex-direction:column; justify-content:center; align-items:center;}
#progress-container{width:80%; max-width:600px; height:20px; background:#555; border:1px solid #333; display:none;}
#progress-bar{width:0%; height:100%; background:lime; transition:width 0.2s;}
#capture-btn, #switch-btn{position:absolute; bottom:20px; width:60px; height:60px; border-radius:50%; border:none; background:rgba(255,255,255,0.8); display:flex; justify-content:center; align-items:center; cursor:pointer; z-index:10;}
#capture-btn{left:50%; transform:translateX(-50%);}
#switch-btn{left:calc(50% + 80px);}
#capture-btn:active, #switch-btn:active{background:rgba(255,255,255,1);}
#capture-icon, #switch-icon{width:30px; height:30px; border-radius:50%;}
#capture-icon{background:red;}
#switch-icon{background:blue;}
#message{color:lime; font-weight:bold; margin-top:5px;}
#warning{color:yellow; font-weight:bold; margin-top:2px;}
#error{color:white; background:darkred; padding:8px; font-weight:bold; margin-top:5px; display:none;}
</style>
</head>
<body>

<h1>全身自撮りカメラ 背景透明 PNG</h1>

<div class="camera-container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
  <div id="dark-overlay">
    <div id="progress-container"><div id="progress-bar"></div></div>
  </div>
  <button id="capture-btn"><div id="capture-icon"></div></button>
  <button id="switch-btn"><div id="switch-icon"></div></button>
</div>

<div id="message"></div>
<div id="warning"></div>
<div id="error"></div>

<canvas id="snapshot" width="400" height="600" style="display:none;"></canvas>

<script>
const video=document.getElementById('video');
const overlay=document.getElementById('overlay');
const overlayCtx=overlay.getContext('2d');
const darkOverlay=document.getElementById('dark-overlay');
const progressContainer=document.getElementById('progress-container');
const progressBar=document.getElementById('progress-bar');
const message=document.getElementById('message');
const warning=document.getElementById('warning');
const errorDiv=document.getElementById('error');
const snapshot=document.getElementById('snapshot');
const snapCtx=snapshot.getContext('2d');
const captureBtn=document.getElementById('capture-btn');
const switchBtn=document.getElementById('switch-btn');

let model;
let stream;
let currentFacing='environment';

function showError(code,msg){ errorDiv.textContent=code+": "+msg; errorDiv.style.display='block'; }
function hideError(){ errorDiv.style.display='none'; }
function updateProgress(p){ progressBar.style.width=p+'%'; }

async function initCamera(){
  hideError(); progressContainer.style.display="block"; updateProgress(0);
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacing}});
    video.srcObject=stream; await video.play();
    updateProgress(20);
  }catch(e){ showError("E001","カメラにアクセスできません: "+e.message); progressContainer.style.display='none'; return; }

  try{
    await tf.setBackend('cpu'); await tf.ready();
    model=await bodyPix.load();
    updateProgress(50);
  }catch(e){ showError("E004","BodyPixモデル読み込み失敗: "+e.message); progressContainer.style.display='none'; return; }

  hideError(); progressContainer.style.display='none';
  detectLoop();
}

async function detectLoop(){
  overlay.width=video.clientWidth; overlay.height=video.clientHeight;
  overlayCtx.clearRect(0,0,overlay.width,overlay.height);

  if(!model) return;

  const segmentation=await model.segmentPerson(video);
  const mask=bodyPix.toMask(segmentation);

  overlayCtx.putImageData(mask,0,0);

  const anyPerson=segmentation.data.some(v=>v>0);
  if(!anyPerson){ warning.textContent="⚠️ 被写体が見つかりません"; }
  else{ warning.textContent=""; message.textContent="被写体検出中..."; }

  requestAnimationFrame(detectLoop);
}

async function captureAndCrop(){
  hideError();
  darkOverlay.style.display='flex'; progressContainer.style.display='block'; updateProgress(0);
  message.textContent="切り取り中...";
  if(!model){ showError("E004","モデルが読み込まれていません"); darkOverlay.style.display='none'; return; }

  try{
    updateProgress(30);
    const segmentation=await model.segmentPerson(video);
    updateProgress(60);

    snapCtx.clearRect(0,0,snapshot.width,snapshot.height);
    const mask=bodyPix.toMask(segmentation);
    snapCtx.save();
    snapCtx.drawImage(video,0,0,snapshot.width,snapshot.height);
    snapCtx.globalCompositeOperation='destination-in';
    snapCtx.putImageData(mask,0,0);
    snapCtx.restore();
    updateProgress(100);

    const link=document.createElement('a');
    link.href=snapshot.toDataURL('image/png');
    link.download='cropped.png';
    link.click();
    message.textContent="切り取り完了。自動保存。iPhoneは長押しで保存してください";
    setTimeout(()=>{darkOverlay.style.display='none'; progressContainer.style.display='none';},500);
  }catch(e){ showError("E003","切り取りに失敗しました: "+e.message); darkOverlay.style.display='none'; progressContainer.style.display='none'; }
}

// カメラ切り替え
switchBtn.addEventListener('click',()=>{
  currentFacing=currentFacing==='environment'?'user':'environment';
  initCamera();
});

captureBtn.addEventListener('click',captureAndCrop);
initCamera();
</script>
</body>
</html>
